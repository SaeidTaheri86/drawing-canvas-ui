<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Procreate Canvas</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    #root { width: 100%; height: 100%; }

    /* ── Layout ── */
    .app {
      display: flex;
      width: 100%;
      height: 100%;
    }

    /* ── Sidebar ── */
    .sidebar {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      width: 64px;
      min-width: 64px;
      height: 100%;
      background: #2a2a2a;
      border-right: 1px solid #3a3a3a;
      padding: 16px 8px;
      z-index: 10;
    }

    .tool-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      width: 48px;
      height: 48px;
      border: none;
      border-radius: 10px;
      background: transparent;
      color: #888;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .tool-btn:hover {
      background: #3a3a3a;
      color: #ccc;
    }

    .tool-btn.active {
      background: #4a90e2;
      color: #fff;
    }

    .tool-btn svg {
      width: 22px;
      height: 22px;
    }

    /* ── Canvas area ── */
    .canvas-area {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #111;
    }

    .drawing-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #fff;
      display: block;
      touch-action: none; /* required for PointerEvents on touch */
    }

    .drawing-canvas[data-tool="pencil"] {
      cursor: crosshair;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useRef, useState, useEffect, useCallback } = React;

    // ─────────────────────────────────────────────
    // Icons
    // ─────────────────────────────────────────────
    const PencilIcon = () => (
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
      </svg>
    );

    // ─────────────────────────────────────────────
    // useDrawing — all canvas drawing logic
    // ─────────────────────────────────────────────
    function useDrawing(canvasRef, activeTool) {
      const isDrawing = useRef(false);
      const lastPos   = useRef({ x: 0, y: 0 });

      // Resize canvas to match its display size without clearing content
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;

        const resize = () => {
          // Snapshot current pixels
          const tempCanvas = document.createElement('canvas');
          tempCanvas.width  = canvas.width;
          tempCanvas.height = canvas.height;
          tempCanvas.getContext('2d').drawImage(canvas, 0, 0);

          canvas.width  = canvas.offsetWidth;
          canvas.height = canvas.offsetHeight;

          // Restore
          const ctx = canvas.getContext('2d');
          ctx.fillStyle = '#fff';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(tempCanvas, 0, 0);
        };

        resize();
        const ro = new ResizeObserver(resize);
        ro.observe(canvas);
        return () => ro.disconnect();
      }, [canvasRef]);

      const getPos = (e) => {
        const rect = canvasRef.current.getBoundingClientRect();
        return { x: e.clientX - rect.left, y: e.clientY - rect.top };
      };

      const onPointerDown = useCallback((e) => {
        if (activeTool !== 'pencil') return;
        e.currentTarget.setPointerCapture(e.pointerId);
        isDrawing.current = true;
        lastPos.current = getPos(e);

        // Draw a dot on single tap/click
        const ctx = canvasRef.current.getContext('2d');
        const { x, y } = lastPos.current;
        ctx.beginPath();
        ctx.arc(x, y, 1, 0, Math.PI * 2);
        ctx.fillStyle = '#000';
        ctx.fill();
      }, [activeTool, canvasRef]);

      const onPointerMove = useCallback((e) => {
        if (!isDrawing.current || activeTool !== 'pencil') return;

        const ctx = canvasRef.current.getContext('2d');
        const pos = getPos(e);

        ctx.beginPath();
        ctx.moveTo(lastPos.current.x, lastPos.current.y);
        ctx.lineTo(pos.x, pos.y);
        ctx.strokeStyle = '#000';
        ctx.lineWidth   = 2;
        ctx.lineCap     = 'round';
        ctx.lineJoin    = 'round';
        ctx.stroke();

        lastPos.current = pos;
      }, [activeTool, canvasRef]);

      const onPointerUp = useCallback(() => {
        isDrawing.current = false;
      }, []);

      return { onPointerDown, onPointerMove, onPointerUp };
    }

    // ─────────────────────────────────────────────
    // Sidebar
    // ─────────────────────────────────────────────
    const TOOLS = [
      { id: 'pencil', label: 'Pencil', Icon: PencilIcon },
    ];

    function Sidebar({ activeTool, onToolChange }) {
      return (
        <aside className="sidebar">
          {TOOLS.map(({ id, label, Icon }) => (
            <button
              key={id}
              className={`tool-btn ${activeTool === id ? 'active' : ''}`}
              title={label}
              onClick={() => onToolChange(id)}
            >
              <Icon />
              {label}
            </button>
          ))}
        </aside>
      );
    }

    // ─────────────────────────────────────────────
    // DrawingCanvas
    // ─────────────────────────────────────────────
    function DrawingCanvas({ activeTool }) {
      const canvasRef = useRef(null);
      const { onPointerDown, onPointerMove, onPointerUp } = useDrawing(canvasRef, activeTool);

      return (
        <div className="canvas-area">
          <canvas
            ref={canvasRef}
            className="drawing-canvas"
            data-tool={activeTool}
            onPointerDown={onPointerDown}
            onPointerMove={onPointerMove}
            onPointerUp={onPointerUp}
            onPointerLeave={onPointerUp}
          />
        </div>
      );
    }

    // ─────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────
    function App() {
      const [activeTool, setActiveTool] = useState('pencil');

      return (
        <div className="app">
          <Sidebar activeTool={activeTool} onToolChange={setActiveTool} />
          <DrawingCanvas activeTool={activeTool} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
